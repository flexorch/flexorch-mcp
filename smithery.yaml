startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "FlexOrch API key — get one at app.flexorch.com/settings"
    required:
      - apiKey
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["flexorch-mcp"],
      env: {
        FLEXORCH_API_KEY: config.apiKey
      }
    })
